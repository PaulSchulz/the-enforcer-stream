  description: |
    Russian frontlines have begun to fail in Zaporizhzhia and Kherson as Russian
    forces have lost both Kamyanske and the Kinburn Spit over the course of the day.
    Russian forces were pushed out of Kamyanske in small skirmishes by Ukrainian
    armed forces, with their position in the town largely evaporating during the
    battle. This significant foothold on the banks of the former resevoir was hoped
    to be used by the Russian Army as a potential jumping point to the city of
    Zaporizhzhia. Now with it's lost the Russians will have to fall back to Stepove
    and take a defensive position. Meanwhile in the Kinburn Spit, Ukrainian forces
    have planted their flag, claiming the land as the 337 Regiment of the Russian
    Army has completely withdrawn from the area. these two losses highlight the
    dangerous state Russian forces find themselves in due to their loss of supplies.
    Russian citizens continue to pile onto the Crimean bridge for a hope at escape
    from Crimea, with the line so long it can viewed from space. food supplies are
    now dwindling in most stores in Crimea as supply lines no longer have the
    capacity or ability to supply any of the stores. Ukrainian drone forces also
    attacked the area again last night along with Moscow and other major refineries
    deep inside of Russia. Ukrainian armed forces also held the line and stopped any
    further advances. France seized a shadow tanker today near the coast of Sicily.
    The Iranians have also launched an attack against a merchant ship inside of the
    Strait of Hormuz. This is the first time since official talks began that Iran
    has attacked a ship in the Hormuz. They have also threatend that any further
    hostilities by Israel in Lebanon can jeopardize the entire deal and lead to
    further war.

